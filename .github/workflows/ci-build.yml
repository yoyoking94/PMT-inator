name: CI - Build et Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Lancer les tests Maven
        run: mvn test
        working-directory: ./backend

  tests-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: ./frontend

      - name: Lancer les tests Angular
        run: npm run test:ci
        working-directory: ./frontend

  build-docker:
    runs-on: ubuntu-latest
    needs: [tests-backend, tests-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Construire l'image Docker du backend
        run: docker build -t pmt-backend ./backend

      - name: Construire l'image Docker du frontend
        run: docker build -t pmt-frontend ./frontend
